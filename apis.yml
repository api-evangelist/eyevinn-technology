aid: eyevinn-technology
name: Eyevinn Technology
description: >-
  Eyevinn Technology is a Stockholm, Sweden based video streaming consultancy
  and open source company specializing in cloud-native video infrastructure,
  HLS and MPEG-DASH packaging, FAST channels, WebRTC ingest (WHIP/WHEP),
  server-side ad insertion (SSAI), broadcast intercom, and player analytics.
  The company operates one of the largest video-focused open source portfolios
  on GitHub (300+ repositories across the Eyevinn and EyevinnOSC orgs) and runs
  Eyevinn Open Source Cloud (OSC), a managed multi-tenant SaaS platform that
  packages 180+ open source projects (databases, media tools, developer tools,
  AI runtimes, productivity apps) into one-click deployments with a token-based
  consumption model, a Personal Access Token (PAT) authenticated REST API, and
  client SDKs for TypeScript, Go, and Terraform. Eyevinn shares OSC revenue
  with the maintainers of the open source projects hosted on the platform,
  positioning OSC as a "Builder Economy" distribution channel for open source
  rather than a vendor-lock-in PaaS.
