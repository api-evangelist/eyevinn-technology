  - type: Features
    data:
      - name: Builder Economy Consultancy
        description: >-
          Outcome-based video streaming engineering services delivered by
          Stockholm-based experts rather than billable hours.
      - name: Open Source Cloud (OSC)
        description: >-
          Managed multi-tenant SaaS hosting 180+ unmodified open source
          services with one-click deployment and a token-based consumption
          model.
      - name: Personal Access Token API
        description: >-
          REST API authenticated via PAT JWTs from app.osaas.io that mint
          per-service Service Access Tokens for fine-grained authorization.
      - name: Polyglot Client SDKs
        description: >-
          First-party SDKs in TypeScript and Go, plus a Terraform provider
          and a GitHub Action for CI/CD integration.
      - name: Model Context Protocol Server
        description: >-
          OSC ships an MCP server so AI agents can browse the catalog and
          provision open source services on a developer's behalf.
      - name: Revenue Sharing With Maintainers
        description: >-
          OSC shares platform revenue with the upstream open source authors
          whose projects are hosted on the cloud.
      - name: FAST Channel Engine
        description: >-
          VOD2Live engine producing 24/7 personalized HLS linear channels
          from an existing VOD library.
      - name: WebRTC Contribution and Distribution
        description: >-
          WHIP/WHEP modules, SRT-to-WHEP bridge, and the Open Intercom
          system cover the WebRTC ingest and distribution surface.
      - name: Player Analytics Specification
        description: >-
          Open EPAS event schema and SDKs for vendor-neutral video QoE
          analytics.
      - name: Media Over QUIC Tooling
        description: >-
          Reference publishers, players, and simulators tracking the IETF
          MoQ working group's evolving transport.
  - type: UseCases
    data:
      - name: Linear FAST Channel Production
        description: >-
          Spin up 24/7 ad-supported linear channels from a VOD catalog using
          Channel Engine, either self-hosted or managed on OSC.
      - name: Low-Latency WebRTC Distribution
        description: >-
          Use WHIP/WHEP and the SRT-to-WHEP bridge to deliver sub-second
          contribution and playback experiences.
      - name: Browser-Based Broadcast Intercom
        description: >-
          Replace hardware intercom panels in live production with the
          Open Intercom WebRTC system.
      - name: Managed Open Source PaaS
        description: >-
          Use OSC to provision PostgreSQL, ClickHouse, Owncast, Gitea, n8n,
          Grafana, and dozens of other open source services without DevOps.
      - name: AI Agent Driven DevOps
        description: >-
          Expose OSC to Claude, Copilot, and other LLM agents via the MCP
          server and VS Code Chat extension.
      - name: Vendor-Neutral Player Analytics
        description: >-
          Adopt EPAS to ship player QoE telemetry to a self-controlled sink
          rather than a closed analytics vendor.
      - name: Media Supply Chain Orchestration
        description: >-
          Compose ingest, transcode, package, and distribute steps with the
          Media Supply Orchestrator framework.
  - type: Integrations
    data:
      - name: Terraform
        description: >-
          Official Terraform provider (terraform-provider-osc) lets users
          declare OSC service instances as infrastructure-as-code.
      - name: GitHub Actions
        description: >-
          Official GitHub Action provisions OSC service instances from CI
          pipelines.
      - name: Model Context Protocol
        description: >-
          MCP server exposes OSC catalog and provisioning tools to AI
          agents over the MCP standard.
      - name: VS Code Copilot Chat
        description: >-
          OSC Architect VS Code extension integrates OSC into Copilot Chat
          sessions.
      - name: FFmpeg
        description: >-
          FFmpeg is offered as a first-class managed service in the OSC
          catalog.
      - name: Shaka Packager
        description: >-
          Google's Shaka Packager is available as a managed OSC service
          for HLS/DASH packaging.
      - name: Owncast
        description: >-
          The Owncast self-hosted streaming server is a managed service in
          the OSC catalog.
      - name: PostgreSQL
        description: >-
          PostgreSQL is one of many managed database services on OSC.
      - name: Redis / Valkey
        description: >-
          Valkey (the open source Redis fork) and Redis-compatible engines
          are available as managed services and used by Channel Engine for
          HA.
      - name: ClickHouse
        description: >-
          ClickHouse is offered as a managed OLAP database service on OSC.
      - name: n8n
        description: >-
          n8n workflow automation is available as a managed OSC service.
      - name: Grafana
        description: >-
          Grafana dashboards can be deployed on OSC in a single click.
      - name: Gitea
        description: >-
          Self-hosted Git via Gitea is part of the OSC developer-tools
          catalog.
      - name: Nextcloud
        description: >-
          Nextcloud is offered as a managed productivity service on OSC.
  - type: Solutions
    data:
      - name: Streaming Engineering Services
        description: >-
          Outcome-based consulting on cloud-native video infrastructure,
          packaging, ad insertion, and live production.
      - name: Open Source Cloud Subscription
        description: >-
          Tiered token-based plans (Basic free, Personal EUR 15/mo,
          Professional EUR 69/mo) for self-service open source deployment.
      - name: Liivo No-Code AI App Deployment
        description: >-
          AI-powered companion product that turns plain-language prompts
          into deployed OSC-hosted applications.
