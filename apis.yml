apis:
  - aid: eyevinn-technology:osc-rest-api
    name: Eyevinn Open Source Cloud REST API
    description: >-
      The Eyevinn Open Source Cloud (OSC) REST API is the management plane for
      provisioning and operating service instances on the OSC platform. The API
      uses Personal Access Tokens (PATs) issued from app.osaas.io and a custom
      `x-pat-jwt: Bearer <PAT>` header to obtain short-lived Service Access
      Tokens (SATs) per service from `https://token.svc.prod.osaas.io/servicetoken`.
      Once a SAT is obtained, callers create, list, and remove instances of
      any of the 180+ services on OSC (PostgreSQL, FFmpeg, Encore, Shaka
      Packager, ClickHouse, Owncast, Gitea, Grafana, n8n, MinIO, and many
      more). Workspace, billing, and custom application ("MyApps") management
      are also exposed. Eyevinn publishes first-party client SDKs in
      TypeScript (`@osaas/client-core`, `@osaas/client-services`,
      `@osaas/client-transcode`) and Go (`EyevinnOSC/client-go`), plus a
      Terraform provider and a GitHub Action.
    humanURL: https://docs.osaas.io/osaas-api-docs/docs/index.html
    baseURL: https://api.osaas.io
    image: https://kinlane-images.s3.amazonaws.com/shared/apis-json/apis-json-logo.jpg
    tags:
      - Open Source Cloud
      - OSC
      - Management
      - REST
    properties:
      - type: Documentation
        url: https://docs.osaas.io/osaas-api-docs/docs/index.html
      - type: APIReference
        url: https://docs.osaas.io/osaas-api-docs/docs/index.html
      - type: GettingStarted
        url: https://docs.osaas.io
      - type: Authentication
        url: https://docs.osaas.io/osaas-api-docs/docs/index.html
      - type: SDKs
        url: https://github.com/EyevinnOSC/client-ts
      - type: SDKs
        url: https://github.com/EyevinnOSC/client-go
      - type: CLI
        url: https://www.npmjs.com/package/@osaas/cli
      - type: TerraformProvider
        url: https://github.com/EyevinnOSC/terraform-provider-osc
      - type: GitHubAction
        url: https://github.com/EyevinnOSC/action
      - type: MCPServer
        url: https://github.com/EyevinnOSC/mcp-server
    x-features:
      - One-Click Open Source Service Deployment
      - 180+ Managed Services Catalog
      - Personal Access Token Authentication
      - Per-Service Service Access Tokens
      - Workspace and Billing Isolation
      - Custom Application Hosting (MyApps)
      - Token-Based Consumption Metering
      - Multi-Region Hosting (US and Sweden)
      - Revenue Sharing With Open Source Creators
      - Terraform and GitHub Actions Integration
    x-use-cases:
      - Deploy PostgreSQL, ClickHouse, or Valkey without managing infrastructure
      - Spin up Owncast, SRS, or Restreamer for live video
      - Run FFmpeg, Encore, or Shaka Packager as a managed transcoding service
      - Host Gitea, Grafana, or n8n for internal developer workflows
      - Provision per-tenant SaaS stacks via Terraform
      - Broker AI agent access to open source tools via MCP
  - aid: eyevinn-technology:channel-engine
    name: Eyevinn Channel Engine
    description: >-
      Channel Engine is an open source JavaScript/TypeScript library for
      producing 24/7 HLS FAST (Free Ad-Supported Streaming Television) linear
      channels from already-transcoded HLS VOD assets using VOD2Live
      technology. It supports personalized per-viewer channels, live stream
      mixing, Redis/Valkey high availability, WebVTT subtitles, and beta DRM
      encryption. The engine can run standalone via Docker or as a managed
      service on Eyevinn Open Source Cloud.
    humanURL: https://github.com/Eyevinn/channel-engine
    image: https://kinlane-images.s3.amazonaws.com/shared/apis-json/apis-json-logo.jpg
    tags:
      - Channel Engine
      - FAST Channels
      - HLS
      - Linear TV
      - VOD2Live
    properties:
      - type: GitHubRepository
        url: https://github.com/Eyevinn/channel-engine
      - type: License
        url: https://github.com/Eyevinn/channel-engine/blob/master/LICENSE
        x-license: Apache-2.0
    x-features:
      - VOD2Live Linear Channels
      - Personalized Channels
      - Live Stream Mixing
      - WebVTT Subtitle Support
      - DRM Encryption (Beta)
      - Redis/Valkey High Availability
    x-use-cases:
      - Run 24/7 HLS FAST channels from a VOD library
      - Produce per-viewer personalized linear streams
      - Mix scheduled VOD with live events
  - aid: eyevinn-technology:whip-whep
    name: Eyevinn WHIP and WHEP Modules
    description: >-
      Open source TypeScript implementations of the IETF WebRTC HTTP Ingestion
      Protocol (WHIP) and WebRTC HTTP Egress Protocol (WHEP). Used to ingest
      and distribute low-latency WebRTC media over standard HTTP signaling.
    humanURL: https://github.com/Eyevinn/whip
    image: https://kinlane-images.s3.amazonaws.com/shared/apis-json/apis-json-logo.jpg
    tags:
      - Low Latency
      - WebRTC
      - WHEP
      - WHIP
    properties:
      - type: GitHubRepository
        url: https://github.com/Eyevinn/whip
    x-features:
      - WHIP Ingest Endpoint
      - WHEP Egress Endpoint
      - HTTP Signaling for WebRTC
    x-use-cases:
      - Ingest contribution feeds over WebRTC
      - Distribute sub-second WebRTC playback
  - aid: eyevinn-technology:player-analytics
    name: Eyevinn Player Analytics Specification (EPAS)
    description: >-
      EPAS is an open specification and SDK suite for collecting video player
      analytics in real time across web and native players. Eyevinn maintains
      the client SDK for web (`player-analytics-client-sdk-web`) and an event
      sink that can be self-hosted or run on Open Source Cloud.
    humanURL: https://github.com/Eyevinn/player-analytics-specification
    image: https://kinlane-images.s3.amazonaws.com/shared/apis-json/apis-json-logo.jpg
    tags:
      - EPAS
      - Player Analytics
      - Video Analytics
    properties:
      - type: GitHubRepository
        url: https://github.com/Eyevinn/player-analytics-specification
      - type: SDKs
        url: https://github.com/Eyevinn/player-analytics-client-sdk-web
    x-features:
      - Open Player Analytics Event Schema
      - Web Client SDK
      - Self-Hostable Event Sink
    x-use-cases:
      - Collect player QoE metrics without vendor lock-in
      - Stream analytics events to a custom data lake
  - aid: eyevinn-technology:intercom
    name: Eyevinn Open Intercom
    description: >-
      Open Intercom is a low-latency, web-based VoIP broadcast intercom system
      built on WebRTC. It is composed of `intercom-manager` (the server and
      management API) and `intercom-frontend` (the browser-based talkback
      client). Designed for live production environments as an open source
      alternative to traditional broadcast intercom hardware.
    humanURL: https://github.com/Eyevinn/intercom-manager
    image: https://kinlane-images.s3.amazonaws.com/shared/apis-json/apis-json-logo.jpg
    tags:
      - Broadcast
      - Intercom
      - Live Production
      - VoIP
      - WebRTC
    properties:
      - type: GitHubRepository
        url: https://github.com/Eyevinn/intercom-manager
      - type: GitHubRepository
        url: https://github.com/Eyevinn/intercom-frontend
    x-features:
      - WebRTC Low-Latency Audio
      - Browser-Based Client
      - Multi-Channel Talkback
    x-use-cases:
      - Replace hardware intercom in live broadcast
      - Coordinate remote production crews
  - aid: eyevinn-technology:srt-whep
    name: Eyevinn SRT to WHEP Bridge
    description: >-
      A Rust service that ingests SRT (Secure Reliable Transport) contribution
      feeds and re-publishes them as WebRTC playback streams via WHEP, enabling
      sub-second latency playback of SRT contributions in any modern browser.
    humanURL: https://github.com/Eyevinn/srt-whep
    image: https://kinlane-images.s3.amazonaws.com/shared/apis-json/apis-json-logo.jpg
    tags:
      - Contribution
      - SRT
      - WebRTC
      - WHEP
    properties:
      - type: GitHubRepository
        url: https://github.com/Eyevinn/srt-whep
    x-features:
      - SRT Ingest
      - WHEP Egress
      - Sub-Second Latency Playback
    x-use-cases:
      - Preview SRT contribution feeds in-browser
      - Bridge legacy SRT workflows to WebRTC distribution
  - aid: eyevinn-technology:media-supply-orchestrator
    name: Eyevinn Media Supply Orchestrator
    description: >-
      Open source TypeScript framework for orchestrating media supply chain
      workflows — ingest, transcoding, packaging, QC, and distribution — across
      cloud-native components. Pairs with the Eyevinn Open Source Cloud
      catalogue so each step can be a managed OSC service.
    humanURL: https://github.com/Eyevinn/media-supply-orchestrator
    image: https://kinlane-images.s3.amazonaws.com/shared/apis-json/apis-json-logo.jpg
    tags:
      - Media Supply Chain
      - Orchestration
      - Workflows
    properties:
      - type: GitHubRepository
        url: https://github.com/Eyevinn/media-supply-orchestrator
    x-features:
      - Workflow Orchestration
      - Pluggable Step Adapters
      - OSC Integration
    x-use-cases:
      - Stitch ingest, transcode, package, and publish steps
      - Coordinate hybrid on-prem and OSC workflows
  - aid: eyevinn-technology:moq-tools
    name: Eyevinn Media Over QUIC (MoQ) Tools
    description: >-
      A suite of experimental tools tracking the IETF Media Over QUIC working
      group, including `moqlivemock` (a Go publisher simulator) and
      `warp-player` (a CMAF media player over MoQ transport).
    humanURL: https://github.com/Eyevinn/moqlivemock
